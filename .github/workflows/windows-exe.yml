name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/windows-exe.yml'
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: Build Yulong VPN Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Windows icon
        shell: pwsh
        run: |
          python scripts/create_windows_icon.py 2>&1 | Tee-Object -FilePath icon-generate.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          npm install 2>&1 | Tee-Object -FilePath npm-install.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Frontend typecheck and build
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath frontend-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rust compile check
        shell: pwsh
        run: |
          cd src-tauri
          cargo check 2>&1 | Tee-Object -FilePath ../rust-check.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run tauri:build 2>&1 | Tee-Object -FilePath tauri-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: YulongVPN-Windows-Build-Logs
          path: |
            icon-generate.log
            npm-install.log
            frontend-build.log
            rust-check.log
            tauri-build.log
          if-no-files-found: ignore

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: YulongVPN-Windows-Bundle
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
