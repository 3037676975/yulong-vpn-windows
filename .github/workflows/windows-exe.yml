name: Build Windows Functional EXE

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/windows-exe.yml'
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: Build and self-check Yulong VPN Windows
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Generate Windows icon
        shell: pwsh
        run: |
          python scripts/create_windows_icon.py 2>&1 | Tee-Object -FilePath icon-generate.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Download and validate official mihomo core
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./scripts/download_mihomo.ps1 2>&1 | Tee-Object -FilePath mihomo-download.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $core = Get-Item src-tauri/resources/mihomo.exe
          if ($core.Length -lt 5MB) { throw "mihomo.exe is too small" }
          & $core.FullName -v 2>&1 | Tee-Object -FilePath mihomo-version.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Bundle offline GeoIP and Geosite databases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./scripts/download_geodata.ps1 2>&1 | Tee-Object -FilePath geodata-download.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          foreach ($name in @("geoip.metadb", "geosite.dat")) {
            $file = Get-Item "src-tauri/resources/$name"
            if ($file.Length -lt 100KB) { throw "$name is unexpectedly small" }
          }

      - name: Mihomo runtime and dedicated-port smoke test
        shell: pwsh
        run: |
          $smokeDir = Join-Path $env:RUNNER_TEMP "yulong-mihomo-smoke"
          New-Item -ItemType Directory -Path $smokeDir -Force | Out-Null
          Copy-Item src-tauri/resources/geoip.metadb $smokeDir
          Copy-Item src-tauri/resources/geosite.dat $smokeDir
          @"
          mixed-port: 17890
          external-controller: 127.0.0.1:19090
          allow-lan: false
          mode: rule
          log-level: info
          geodata-mode: true
          geodata-loader: memconservative
          dns:
            enable: true
            listen: 127.0.0.1:17853
            enhanced-mode: fake-ip
            nameserver:
              - 1.1.1.1
            fallback-filter:
              geoip: true
              geoip-code: CN
          proxies: []
          proxy-groups:
            - name: YulongVPN
              type: select
              proxies:
                - DIRECT
          rules:
            - GEOSITE,CN,DIRECT
            - GEOIP,CN,DIRECT
            - MATCH,YulongVPN
          "@ | Set-Content (Join-Path $smokeDir "config.yaml") -Encoding utf8

          $stdout = Join-Path $PWD "mihomo-runtime.log"
          $stderr = Join-Path $PWD "mihomo-runtime-error.log"
          $process = Start-Process `
            -FilePath (Resolve-Path "src-tauri/resources/mihomo.exe") `
            -ArgumentList "-d", $smokeDir, "-f", (Join-Path $smokeDir "config.yaml") `
            -RedirectStandardOutput $stdout `
            -RedirectStandardError $stderr `
            -PassThru
          try {
            $ready = $false
            for ($i = 0; $i -lt 60; $i++) {
              Start-Sleep -Milliseconds 500
              $process.Refresh()
              if ($process.HasExited) { break }
              $client = [System.Net.Sockets.TcpClient]::new()
              try {
                $client.Connect("127.0.0.1", 17890)
                $ready = $client.Connected
              } catch {
                $ready = $false
              } finally {
                $client.Dispose()
              }
              if ($ready) { break }
            }
            if (-not $ready) {
              Get-Content $stdout -ErrorAction SilentlyContinue
              Get-Content $stderr -ErrorAction SilentlyContinue
              throw "mihomo did not listen on the dedicated proxy port 17890"
            }
            "mihomo runtime smoke test passed on 127.0.0.1:17890" | Tee-Object -FilePath mihomo-runtime-smoke.log
          } finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }

      - name: Public backend smoke check
        shell: pwsh
        run: |
          $noticeText = curl.exe -fsS --connect-timeout 10 --max-time 20 "https://api2.smilechat.cn/api/notices?public=1"
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($noticeText)) {
            throw "Public notice API is unavailable"
          }
          $noticeText | Set-Content backend-notice.json -Encoding UTF8
          $noticeText | ConvertFrom-Json | Out-Null

          $invalidBody = '{"code":"__windows_ci_invalid__","clientId":"windows-ci","pluginVersion":"windows-v1.0.6"}'
          $authText = curl.exe -sS --connect-timeout 10 --max-time 20 -H "content-type: application/json" -d $invalidBody "https://api2.smilechat.cn/api/access-code"
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($authText)) {
            throw "Access-code API is unavailable"
          }
          $authText | Set-Content backend-invalid-auth.json -Encoding UTF8
          $auth = $authText | ConvertFrom-Json
          if ($auth.ok -eq $true) {
            throw "Backend unexpectedly accepted the CI invalid password"
          }
          "backend smoke check passed" | Set-Content backend-smoke.log -Encoding UTF8

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          npm install 2>&1 | Tee-Object -FilePath npm-install.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Frontend typecheck and build
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath frontend-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rust syntax formatting pass
        shell: pwsh
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all 2>&1 | Tee-Object -FilePath rust-fmt.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rust unit tests
        shell: pwsh
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml 2>&1 | Tee-Object -FilePath rust-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rust compile check
        shell: pwsh
        run: |
          cargo check --manifest-path src-tauri/Cargo.toml 2>&1 | Tee-Object -FilePath rust-check.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run tauri:build 2>&1 | Tee-Object -FilePath tauri-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate installer and bundled core
        shell: pwsh
        run: |
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not generated" }
          if ($installer.Length -lt 8MB) {
            throw "Installer is unexpectedly small and may not contain mihomo: $($installer.Length) bytes"
          }
          $core = Get-Item src-tauri/resources/mihomo.exe
          $summary = @(
            "installer=$($installer.FullName)",
            "installer_bytes=$($installer.Length)",
            "core_bytes=$($core.Length)",
            "core_sha256=$((Get-FileHash $core.FullName -Algorithm SHA256).Hash)",
            "installer_sha256=$((Get-FileHash $installer.FullName -Algorithm SHA256).Hash)"
          )
          $summary | Set-Content package-validation.log -Encoding UTF8
          $summary | ForEach-Object { Write-Host $_ }

      - name: Launch application smoke test
        shell: pwsh
        run: |
          $app = Get-Item src-tauri/target/release/yulong-vpn-windows.exe
          $process = Start-Process -FilePath $app.FullName -PassThru
          Start-Sleep -Seconds 10
          $process.Refresh()
          if ($process.HasExited) {
            throw "Application exited during startup smoke test with code $($process.ExitCode)"
          }
          "application process stayed alive for 10 seconds; pid=$($process.Id)" | Set-Content app-launch-smoke.log -Encoding UTF8
          Stop-Process -Id $process.Id -Force

      - name: Upload build and self-check logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: YulongVPN-Windows-Functional-Logs
          path: |
            icon-generate.log
            mihomo-download.log
            mihomo-version.log
            geodata-download.log
            mihomo-runtime.log
            mihomo-runtime-error.log
            mihomo-runtime-smoke.log
            backend-notice.json
            backend-invalid-auth.json
            backend-smoke.log
            npm-install.log
            frontend-build.log
            rust-fmt.log
            rust-test.log
            rust-check.log
            tauri-build.log
            package-validation.log
            app-launch-smoke.log
          if-no-files-found: ignore

      - name: Upload functional Windows installer
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: YulongVPN-Windows-v1.0.6-Functional
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Publish verified installer as GitHub prerelease
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not generated" }
          $releaseFile = "YulongVPN-Windows-v1.0.6-Setup.exe"
          Copy-Item $installer.FullName $releaseFile -Force
          $tag = "windows-v1.0.6-$env:GITHUB_RUN_NUMBER"
          gh release create $tag $releaseFile `
            --repo $env:GITHUB_REPOSITORY `
            --title "玉龙VPN Windows v1.0.6" `
            --notes "与 Android v10 共用 api2.smilechat.cn 后台；包含动态密码、公告、到期时间、配置同步、节点切换、Windows 系统代理、托盘、开机自启和内置 mihomo v1.19.28。" `
            --prerelease
